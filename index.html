  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.82);
    z-index: 0;
    pointer-events: none;
  }
  .site-header, main { position: relative; z-index: 1; }

  /* ===== HEADER ===== */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    display: flex; align-items: center; gap: 1rem;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .logo {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, var(--c1), var(--c4));
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 18px;
    font-family: 'Playfair Display', serif;
    flex-shrink: 0;
  }
  .site-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 700; color: var(--text);
    line-height: 1.1;
  }
  .site-header p { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .header-back {
    margin-left: auto;
    display: none;
    align-items: center; gap: 6px;
    background: none; border: 1.5px solid var(--border);
    padding: 7px 16px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    cursor: pointer; color: var(--text); transition: all 0.15s;
  }
  .header-back:hover { background: var(--bg); border-color: rgba(0,0,0,0.15); }
  .header-back.visible { display: flex; }

  /* ===== MAIN ===== */
  main { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  /* ===== INICIO ===== */
  #vista-inicio { animation: fadeIn 0.3s ease; }
  .intro { margin-bottom: 2.5rem; }
  .intro h2 { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; line-height: 1.2; }
  .intro p { color: var(--muted); font-size: 15px; margin-top: 8px; font-weight: 300; }

  .grado-bloque { margin-bottom: 2.5rem; }
  .grado-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 12px; padding-left: 2px;
  }
  .cursos-fila { display: flex; gap: 14px; flex-wrap: wrap; }
  .curso-card {
    flex: 1; min-width: 140px; max-width: 200px;
    background: var(--surface); border-radius: 16px;
    border: 1px solid var(--border);
    padding: 1.25rem 1.1rem 1rem;
    cursor: pointer; transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    position: relative; overflow: hidden;
  }
  .curso-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    border-radius: 16px 16px 0 0;
  }
  .curso-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    border-color: rgba(0,0,0,0.12);
  }
  .curso-card:active { transform: translateY(-1px); }
  .curso-card .nombre {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 700; line-height: 1;
    margin-bottom: 6px;
  }
  .curso-card .cant {
    font-size: 12px; color: var(--muted); font-weight: 300;
  }
  .curso-card .flecha {
    position: absolute; bottom: 12px; right: 14px;
    font-size: 16px; opacity: 0.3; transition: opacity 0.15s, transform 0.15s;
  }
  .curso-card:hover .flecha { opacity: 0.7; transform: translateX(3px); }

  /* Colores por grado */
  .g1 .curso-card::before { background: var(--c1); }
  .g1 .curso-card .nombre { color: var(--c1); }
  .g2 .curso-card::before { background: var(--c2); }
  .g2 .curso-card .nombre { color: var(--c2); }
  .g3 .curso-card::before { background: var(--c3); }
  .g3 .curso-card .nombre { color: var(--c3); }
  .g4 .curso-card::before { background: var(--c4); }
  .g4 .curso-card .nombre { color: var(--c4); }
  .g5 .curso-card::before { background: var(--c5); }
  .g5 .curso-card .nombre { color: var(--c5); }
  .g6 .curso-card::before { background: var(--c6); }
  .g6 .curso-card .nombre { color: var(--c6); }

  /* ===== DETALLE ===== */
  #vista-detalle { display: none; animation: fadeIn 0.3s ease; }
  .detalle-header { margin-bottom: 1.5rem; }
  .detalle-header .curso-badge {
    display: inline-block; padding: 4px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 500; margin-bottom: 10px;
    letter-spacing: 0.04em;
  }
  .detalle-header h2 {
    font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700;
  }
  .detalle-header .total { font-size: 14px; color: var(--muted); margin-top: 4px; font-weight: 300; }

  .buscador-wrap { position: relative; margin-bottom: 1.25rem; }
  .buscador-wrap svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: var(--muted); pointer-events: none;
  }
  .buscador {
    width: 100%; padding: 10px 14px 10px 40px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: var(--surface); color: var(--text);
    transition: border-color 0.15s; outline: none;
  }
  .buscador:focus { border-color: rgba(0,0,0,0.25); }
  .buscador::placeholder { color: var(--muted); }

  .tabla-wrap {
    background: var(--surface); border-radius: 14px;
    border: 1px solid var(--border); overflow: hidden;
  }
  .tabla-head {
    display: grid; grid-template-columns: 50px 1fr;
    padding: 10px 16px; background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 500; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .alumno-row {
    display: grid; grid-template-columns: 50px 1fr;
    padding: 11px 16px; border-bottom: 1px solid var(--border);
    transition: background 0.1s; align-items: center;
  }
  .alumno-row:last-child { border-bottom: none; }
  .alumno-row:hover { background: var(--bg); }
  .alumno-row .num { font-size: 12px; color: var(--muted); font-weight: 300; }
  .alumno-row .nom { font-size: 14px; font-weight: 400; }
  .sin-resultados {
    padding: 2.5rem; text-align: center;
    color: var(--muted); font-size: 14px; font-weight: 300;
  }

  /* ===== FOOTER ===== */
  .footer-total {
    margin-top: 3rem; padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    text-align: center; font-size: 13px; color: var(--muted); font-weight: 300;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 600px) {
    main { padding: 1.5rem 1rem 3rem; }
    .cursos-fila { gap: 10px; }
    .curso-card { min-width: 110px; }
    .intro h2 { font-size: 24px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">25</div>
  <div>
    <h1>U.E. 25 de Mayo</h1>
    <p>Lista de Estudiantes — Gestión 2025</p>
  </div>
  <button class="header-back" id="btn-volver" onclick="volverInicio()">
    ← Volver al inicio
  </button>
</header>

<main>
  <!-- PANTALLA INICIO -->
  <div id="vista-inicio">
    <div class="intro">
      <h2>U.E. 25 de Mayo</h2>
      <p>Selecciona un curso para ver su lista completa de estudiantes.</p>
    </div>

    <div class="grado-bloque g1">
      <div class="grado-label">Primero</div>
      <div class="cursos-fila" id="fila-1"></div>
    </div>
    <div class="grado-bloque g2">
      <div class="grado-label">Segundo</div>
      <div class="cursos-fila" id="fila-2"></div>
    </div>
    <div class="grado-bloque g3">
      <div class="grado-label">Tercero</div>
      <div class="cursos-fila" id="fila-3"></div>
    </div>
    <div class="grado-bloque g4">
      <div class="grado-label">Cuarto</div>
      <div class="cursos-fila" id="fila-4"></div>
    </div>
    <div class="grado-bloque g5">
      <div class="grado-label">Quinto</div>
      <div class="cursos-fila" id="fila-5"></div>
    </div>
    <div class="grado-bloque g6">
      <div class="grado-label">Sexto</div>
      <div class="cursos-fila" id="fila-6"></div>
    </div>

    <div class="footer-total" id="total-global"></div>
  </div>

  <!-- PANTALLA DETALLE -->
  <div id="vista-detalle">
    <div class="detalle-header">
      <div class="curso-badge" id="badge-curso"></div>
      <h2 id="titulo-detalle"></h2>
      <div class="total" id="total-detalle"></div>
    </div>
    <div class="buscador-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="buscador" type="text" id="buscador" placeholder="Buscar estudiante por nombre..." oninput="filtrar(this.value)">
    </div>
    <div class="tabla-wrap">

const grados = [

  { label: "Segundo", fila: "fila-2", cursos: ["2do A","2do B","2do C"] },

  { label: "Sexto",   fila: "fila-6", cursos: ["6to A","6to B"] }
];

const colores = {
  "1": "#7B6CF6", "2": "#0EBF8A", "3": "#F26D3D",
  "4": "#3A9BDC", "5": "#D4527D", "6": "#C78A1A"
};

let cursoActual = null;

function init() {
  let totalGlobal = 0;
  grados.forEach(g => {
    const fila = document.getElementById(g.fila);
    const num = g.fila.replace('fila-','');
    const color = colores[num];
    g.cursos.forEach(c => {
      const count = datos[c].length;
      totalGlobal += count;
      const btn = document.createElement('div');
      btn.className = 'curso-card';
      btn.innerHTML = `<div class="nombre">${c}</div><div class="cant">${count} estudiantes</div><span class="flecha">→</span>`;
      btn.onclick = () => verCurso(c, color);
      fila.appendChild(btn);
    });
  });
  document.getElementById('total-global').textContent = `Total: ${totalGlobal} estudiantes registrados en ${Object.keys(datos).length} cursos`;
}

function verCurso(curso, color) {
  cursoActual = curso;
  const num = curso.charAt(0);
  const c = color || colores[num] || '#888';

  document.getElementById('vista-inicio').style.display = 'none';
  document.getElementById('vista-detalle').style.display = 'block';
  document.getElementById('vista-detalle').style.animation = 'none';
  setTimeout(() => document.getElementById('vista-detalle').style.animation = '', 10);

  const badge = document.getElementById('badge-curso');
  badge.textContent = curso;
  badge.style.background = c + '18';
  badge.style.color = c;
  badge.style.border = '1px solid ' + c + '40';

  document.getElementById('titulo-detalle').textContent = 'Lista del curso ' + curso;
  document.getElementById('total-detalle').textContent = datos[curso].length + ' estudiantes registrados';
  document.getElementById('buscador').value = '';

  document.getElementById('btn-volver').classList.add('visible');
  renderLista(datos[curso]);
}

function renderLista(lista) {
  const cont = document.getElementById('lista-alumnos');
  if (!lista.length) {
    cont.innerHTML = '<div class="sin-resultados">No se encontraron estudiantes con ese nombre.</div>';
    return;
  }
  cont.innerHTML = lista.map((n, i) =>
    `<div class="alumno-row"><span class="num">${i+1}</span><span class="nom">${n}</span></div>`
  ).join('');
}

function filtrar(q) {
  if (!cursoActual) return;
  const r = datos[cursoActual].filter(n => n.toLowerCase().includes(q.toLowerCase().trim()));
  renderLista(r);
}

function volverInicio() {
  document.getElementById('vista-detalle').style.display = 'none';
  document.getElementById('vista-inicio').style.display = 'block';
  document.getElementById('btn-volver').classList.remove('visible');
  cursoActual = null;
}

init();
